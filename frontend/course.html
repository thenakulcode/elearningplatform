<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course — LearnPath</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .course-layout { display: flex; gap: 2rem; }
    .lesson-sidebar {
      width: 300px; flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      height: fit-content;
      position: sticky; top: 1rem;
      overflow: hidden;
    }
    .ls-header {
      padding: 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .ls-header h3 { font-size: 1rem; }
    .module-block { border-bottom: 1px solid var(--border); }
    .module-title {
      padding: 0.9rem 1.25rem;
      font-weight: 600; font-size: 0.88rem;
      color: var(--text2);
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; background: var(--surface2);
    }
    .module-title:hover { color: var(--text); }
    .lesson-list { padding: 0.4rem 0; }
    .lesson-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.7rem 1.25rem;
      font-size: 0.87rem;
      cursor: pointer;
      transition: background 0.15s;
      border-left: 3px solid transparent;
      color: var(--text2);
    }
    .lesson-item:hover { background: rgba(108,99,255,0.08); color: var(--text); }
    .lesson-item.active { background: rgba(108,99,255,0.12); border-color: var(--accent); color: var(--accent2); }
    .lesson-item.done { color: var(--success); }
    .lesson-check { font-size: 0.9rem; flex-shrink: 0; }

    .lesson-viewer { flex: 1; min-width: 0; }
    .lv-header { margin-bottom: 1.5rem; }
    .lv-header h2 { font-size: 1.7rem; margin-bottom: 0.5rem; }
    .lv-meta { display: flex; align-items: center; gap: 1rem; font-size: 0.85rem; color: var(--text2); }

    .lesson-content-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      line-height: 1.8;
      font-size: 0.97rem;
      min-height: 300px;
    }
    .lesson-content-box p { margin-bottom: 1rem; color: var(--text2); }
    .lesson-content-box h2, .lesson-content-box h3 { margin: 1.5rem 0 0.75rem; }
    .lesson-content-box code {
      background: var(--bg3); color: var(--accent2);
      padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.88em;
    }
    .lesson-content-box pre {
      background: var(--bg3); padding: 1.25rem; border-radius: var(--radius);
      overflow-x: auto; margin: 1rem 0;
    }
    .lesson-content-box ul, .lesson-content-box ol { padding-left: 1.5rem; margin-bottom: 1rem; }
    .lesson-content-box li { margin-bottom: 0.4rem; color: var(--text2); }

    .video-container {
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 1.5rem;
      background: #000;
      aspect-ratio: 16/9;
    }
    .video-container iframe, .video-container video { width: 100%; height: 100%; border: none; }

    .lesson-actions {
      display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap;
    }

    .course-hero {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 2rem;
    }
    .course-hero h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    .course-hero p  { opacity: 0.85; }

    .empty-lesson {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 400px; gap: 1rem;
    }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="logo">Learn<span>Path</span></div>
  <nav>
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="courses.html" class="active">📚 Courses</a>
    <a href="progress.html">📊 Progress</a>
  </nav>
  <div style="margin-top:auto;">
    <a href="#" onclick="logout()" style="color:var(--danger);">🚪 Logout</a>
  </div>
</div>

<div class="main-content">
  <div id="loadingScreen" class="flex-center" style="min-height:60vh;">
    <div class="spinner"></div>
  </div>

  <div id="courseContent" class="hidden">
    <div class="course-hero" id="courseHero"></div>

    <div class="course-layout">
      <!-- Lesson sidebar -->
      <div class="lesson-sidebar">
        <div class="ls-header">
          <h3>📋 Course Content</h3>
          <div style="margin-top:0.5rem;">
            <div class="progress-bar-wrap">
              <div class="progress-bar-fill" id="sidebarProgress" style="width:0%"></div>
            </div>
            <div style="font-size:0.78rem;color:var(--text2);margin-top:0.3rem;">
              <span id="progressText">0%</span> complete
            </div>
          </div>
        </div>
        <div id="moduleList"></div>
      </div>

      <!-- Lesson viewer -->
      <div class="lesson-viewer">
        <div id="emptyLesson" class="empty-lesson">
          <div style="font-size:3rem;">👈</div>
          <h3>Select a lesson to begin</h3>
          <p class="text-muted">Choose from the course content panel</p>
        </div>
        <div id="lessonPane" class="hidden">
          <div class="lv-header">
            <h2 id="lessonTitle">Lesson</h2>
            <div class="lv-meta">
              <span id="lessonXP">⚡ 0 XP</span>
              <span id="lessonDone" class="hidden" style="color:var(--success);">✅ Completed</span>
            </div>
          </div>
          <div id="videoSection" class="hidden">
            <div class="video-container" id="videoContainer"></div>
          </div>
          <div class="lesson-content-box" id="lessonContent"></div>
          <div class="lesson-actions">
            <button class="btn btn-success" id="completeBtn" onclick="markComplete()">✅ Mark Complete</button>
            <button class="btn btn-primary" id="quizBtn" onclick="goToQuiz()">🎯 Take Quiz</button>
            <button class="btn btn-secondary" onclick="window.location.href='courses.html'">← Back</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  requireAuth();
  const params   = new URLSearchParams(location.search);
  const courseId = parseInt(params.get('id'));
  let courseData = null;
  let currentLessonId = null;
  let startTime = Date.now();

  async function loadCourse() {
    try {
      courseData = await api.course(courseId);
      document.getElementById('loadingScreen').classList.add('hidden');
      document.getElementById('courseContent').classList.remove('hidden');
      renderCourseHero();
      renderModules();
      updateProgress();
    } catch(e) {
      toast(e.message, 'error');
    }
  }

  function renderCourseHero() {
    const c = courseData;
    document.title = c.title + ' — LearnPath';
    document.getElementById('courseHero').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
        <div>
          <h1>${c.title}</h1>
          <p>${c.description || ''}</p>
          <div style="margin-top:0.75rem;display:flex;gap:1rem;font-size:0.85rem;">
            <span>👨‍🏫 ${c.instructor_name}</span>
            <span class="badge-pill ${c.difficulty}" style="background:rgba(255,255,255,0.15);color:#fff;">${c.difficulty}</span>
          </div>
        </div>
        ${!c.enrolled ? `<button class="btn" style="background:#fff;color:var(--accent);font-weight:700;"
          onclick="enrollAndRefresh()">Enroll Free →</button>` : ''}
      </div>`;
  }

  function renderModules() {
    const list = document.getElementById('moduleList');
    list.innerHTML = courseData.modules.map((mod, mi) => `
      <div class="module-block">
        <div class="module-title" onclick="toggleModule(${mi})">
          <span>📁 ${mod.title}</span>
          <span id="modArrow${mi}">▼</span>
        </div>
        <div class="lesson-list" id="modLessons${mi}">
          ${mod.lessons.map(l => `
            <div class="lesson-item ${l.completed ? 'done' : ''}" id="lessonItem${l.id}"
                 onclick="openLesson(${l.id})">
              <span class="lesson-check">${l.completed ? '✅' : '○'}</span>
              <span>${l.title}</span>
            </div>`).join('')}
        </div>
      </div>`).join('');
  }

  function toggleModule(idx) {
    const el  = document.getElementById(`modLessons${idx}`);
    const arr = document.getElementById(`modArrow${idx}`);
    el.style.display = el.style.display === 'none' ? '' : 'none';
    arr.textContent  = el.style.display === 'none' ? '▶' : '▼';
  }

  function updateProgress() {
    let total = 0, done = 0;
    courseData.modules.forEach(m => m.lessons.forEach(l => { total++; if(l.completed) done++; }));
    const pct = total ? Math.round(done / total * 100) : 0;
    document.getElementById('sidebarProgress').style.width = pct + '%';
    document.getElementById('progressText').textContent = pct + '%';
  }

  function openLesson(lessonId) {
    // Track time on previous lesson
    if (currentLessonId) {
      const spent = Math.round((Date.now() - startTime) / 1000);
      api.updateProgress({ lesson_id: currentLessonId, time_spent_s: spent }).catch(() => {});
    }
    currentLessonId = lessonId;
    startTime = Date.now();

    // Find lesson data
    let lesson = null;
    courseData.modules.forEach(m => m.lessons.forEach(l => { if(l.id === lessonId) lesson = l; }));
    if (!lesson) return;

    // Highlight active
    document.querySelectorAll('.lesson-item').forEach(el => el.classList.remove('active'));
    document.getElementById(`lessonItem${lessonId}`)?.classList.add('active');

    // Render
    document.getElementById('emptyLesson').classList.add('hidden');
    document.getElementById('lessonPane').classList.remove('hidden');
    document.getElementById('lessonTitle').textContent = lesson.title;
    document.getElementById('lessonXP').textContent = `⚡ ${lesson.xp_reward} XP`;

    const doneBadge = document.getElementById('lessonDone');
    const completeBtn = document.getElementById('completeBtn');
    if (lesson.completed) {
      doneBadge.classList.remove('hidden');
      completeBtn.disabled = true;
      completeBtn.textContent = '✅ Completed';
    } else {
      doneBadge.classList.add('hidden');
      completeBtn.disabled = false;
      completeBtn.textContent = '✅ Mark Complete';
    }

    // Video
    const videoSec = document.getElementById('videoSection');
    if (lesson.video_url) {
      videoSec.classList.remove('hidden');
      const container = document.getElementById('videoContainer');
      if (lesson.video_url.includes('youtube.com') || lesson.video_url.includes('youtu.be')) {
        const vid = lesson.video_url.replace('watch?v=', 'embed/').replace('youtu.be/', 'www.youtube.com/embed/');
        container.innerHTML = `<iframe src="${vid}" allowfullscreen></iframe>`;
      } else {
        container.innerHTML = `<video src="${lesson.video_url}" controls></video>`;
      }
    } else {
      videoSec.classList.add('hidden');
    }

    // Content (render basic markdown-ish)
    const raw = lesson.content || '<p style="color:var(--text3);">No content for this lesson.</p>';
    document.getElementById('lessonContent').innerHTML = renderContent(raw);
  }

  function renderContent(text) {
    // Very simple markdown renderer
    return text
      .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/\n\n/g, '</p><p>')
      .replace(/^/, '<p>')
      .replace(/$/, '</p>');
  }

  async function markComplete() {
    if (!currentLessonId) return;
    const spent = Math.round((Date.now() - startTime) / 1000);
    try {
      await api.updateProgress({ lesson_id: currentLessonId, time_spent_s: spent, completed: true });
      toast('Lesson complete! ⚡ XP earned', 'success');
      // Update local state
      courseData.modules.forEach(m => m.lessons.forEach(l => {
        if (l.id === currentLessonId) l.completed = true;
      }));
      renderModules();
      updateProgress();
      document.getElementById('lessonDone').classList.remove('hidden');
      document.getElementById('completeBtn').disabled = true;
      document.getElementById('completeBtn').textContent = '✅ Completed';
      document.getElementById(`lessonItem${currentLessonId}`)?.classList.add('done');
    } catch(e) { toast(e.message, 'error'); }
  }

  function goToQuiz() {
    if (!currentLessonId) return toast('Select a lesson first', 'warning');
    window.location.href = `quiz.html?lesson=${currentLessonId}&course=${courseId}`;
  }

  async function enrollAndRefresh() {
    try {
      await api.enroll(courseId);
      toast('Enrolled! 🎉', 'success');
      setTimeout(() => location.reload(), 700);
    } catch(e) { toast(e.message, 'error'); }
  }

  loadCourse();
</script>
</body>
</html>
