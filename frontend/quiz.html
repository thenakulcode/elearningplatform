<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — LearnPath</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .quiz-wrapper { max-width: 720px; margin: 0 auto; }
    .quiz-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2rem;
    }
    .quiz-progress-info { font-size: 0.88rem; color: var(--text2); }
    .timer-badge {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 99px; padding: 0.4rem 1rem;
      font-size: 0.9rem; font-family: 'Syne', sans-serif;
      font-weight: 700;
    }
    .timer-badge.warning { color: var(--warning); border-color: var(--warning); }
    .timer-badge.danger  { color: var(--danger);  border-color: var(--danger); animation: pulse 0.5s alternate infinite; }

    @keyframes pulse { from { opacity: 1; } to { opacity: 0.5; } }

    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.3s ease;
    }
    .question-num { font-size: 0.8rem; color: var(--text3); margin-bottom: 0.75rem; }
    .question-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.5rem; line-height: 1.5; }
    .diff-badge { display: inline-block; margin-left: 0.5rem; font-size: 0.72rem; }

    .options-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .option-btn {
      background: var(--bg3); border: 2px solid var(--border);
      border-radius: var(--radius); padding: 0.9rem 1.2rem;
      text-align: left; color: var(--text); font-size: 0.93rem;
      cursor: pointer; transition: all 0.2s;
      width: 100%; font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .option-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(108,99,255,0.08); }
    .option-btn.selected { border-color: var(--accent); background: rgba(108,99,255,0.12); color: var(--accent2); }
    .option-btn.correct  { border-color: var(--success); background: rgba(52,211,153,0.1); color: var(--success); }
    .option-btn.wrong    { border-color: var(--danger);  background: rgba(248,113,113,0.1); color: var(--danger); }
    .option-letter {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--border); display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; font-weight: 700; flex-shrink: 0;
    }
    .option-btn.selected .option-letter { background: var(--accent); color: #fff; }

    .fill-input { font-size: 1rem; }

    .quiz-nav { display: flex; gap: 1rem; justify-content: flex-end; }

    /* Results */
    .results-card {
      text-align: center; padding: 3rem 2rem;
    }
    .score-circle {
      width: 140px; height: 140px;
      border-radius: 50%;
      background: conic-gradient(var(--accent) var(--pct), var(--bg3) 0);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      position: relative;
    }
    .score-circle::after {
      content: '';
      position: absolute; inset: 12px;
      background: var(--surface);
      border-radius: 50%;
    }
    .score-circle .score-num {
      position: relative; z-index: 1;
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem; font-weight: 800;
    }
    .result-meta { display: flex; justify-content: center; gap: 2rem; margin: 1.5rem 0; }
    .result-meta-item { text-align: center; }
    .result-meta-item .val { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 700; }
    .result-meta-item .lbl { font-size: 0.78rem; color: var(--text2); }
    .feedback-list { margin-top: 2rem; text-align: left; }
    .fb-item {
      padding: 1rem; border-radius: var(--radius);
      margin-bottom: 0.75rem;
      border: 1px solid var(--border);
      font-size: 0.88rem;
    }
    .fb-item.correct { border-color: rgba(52,211,153,0.3); background: rgba(52,211,153,0.04); }
    .fb-item.wrong   { border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.04); }
    .fb-item .fb-q    { font-weight: 600; margin-bottom: 0.4rem; }
    .fb-item .fb-row  { display: flex; gap: 0.5rem; font-size: 0.82rem; color: var(--text2); }
    .badge-earned-popup {
      position: fixed; top: 2rem; left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--accent);
      border-radius: var(--radius-lg); padding: 1rem 2rem;
      text-align: center; z-index: 999; animation: fadeUp 0.4s ease;
      box-shadow: var(--glow);
    }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="logo">Learn<span>Path</span></div>
  <nav>
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="courses.html">📚 Courses</a>
    <a href="progress.html">📊 Progress</a>
  </nav>
  <div style="margin-top:auto;">
    <a href="#" onclick="logout()" style="color:var(--danger);">🚪 Logout</a>
  </div>
</div>

<div class="main-content">
  <div class="quiz-wrapper">

    <!-- Loading -->
    <div id="loadingState" class="flex-center" style="min-height:60vh;">
      <div style="text-align:center;">
        <div class="spinner" style="margin:0 auto 1rem;"></div>
        <p class="text-muted">Adapting quiz to your skill level…</p>
      </div>
    </div>

    <!-- Quiz -->
    <div id="quizState" class="hidden">
      <div class="quiz-header">
        <div>
          <h2>🎯 Adaptive Quiz</h2>
          <div class="quiz-progress-info">
            Question <span id="qCurrent">1</span> of <span id="qTotal">0</span>
          </div>
        </div>
        <div class="timer-badge" id="timerBadge">⏱ --:--</div>
      </div>

      <div class="progress-bar-wrap mb-2">
        <div class="progress-bar-fill" id="quizProgressBar" style="width:0%"></div>
      </div>

      <div id="questionArea"></div>

      <div class="quiz-nav">
        <button class="btn btn-secondary" id="prevBtn" onclick="prevQ()" disabled>← Prev</button>
        <button class="btn btn-primary"   id="nextBtn" onclick="nextQ()">Next →</button>
        <button class="btn btn-success hidden" id="submitBtn" onclick="submitQuiz()">Submit Quiz 🚀</button>
      </div>
    </div>

    <!-- Results -->
    <div id="resultsState" class="hidden">
      <div class="card results-card" id="resultsCard"></div>
    </div>

  </div>
</div>

<script src="js/api.js"></script>
<script>
  requireAuth();
  const params   = new URLSearchParams(location.search);
  const lessonId = parseInt(params.get('lesson'));
  const courseId = parseInt(params.get('course'));

  let questions = [];
  let answers   = {};  // { qId: answerStr }
  let current   = 0;
  let timerInterval, timeLeft = 0;

  const LETTERS = ['A','B','C','D','E'];
  const DIFF_LABELS = { 1: '🟢 Easy', 2: '🟡 Medium', 3: '🔴 Hard' };

  async function loadQuiz() {
    try {
      questions = await api.quiz(lessonId);
      timeLeft  = questions.length * 60;  // 1 min per question
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('quizState').classList.remove('hidden');
      document.getElementById('qTotal').textContent = questions.length;
      startTimer();
      renderQuestion();
    } catch(e) {
      document.getElementById('loadingState').innerHTML =
        `<div class="empty-state"><div class="empty-icon">📭</div>
         <h3>No quiz available</h3><p class="text-muted">${e.message}</p>
         <button class="btn btn-primary mt-2" onclick="history.back()">← Go Back</button></div>`;
    }
  }

  function startTimer() {
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerDisplay();
      if (timeLeft <= 0) { clearInterval(timerInterval); submitQuiz(); }
    }, 1000);
  }

  function updateTimerDisplay() {
    const m = Math.floor(timeLeft / 60).toString().padStart(2,'0');
    const s = (timeLeft % 60).toString().padStart(2,'0');
    const el = document.getElementById('timerBadge');
    el.textContent = `⏱ ${m}:${s}`;
    el.className = 'timer-badge' +
      (timeLeft <= 30 ? ' danger' : timeLeft <= 60 ? ' warning' : '');
  }

  function renderQuestion() {
    const q  = questions[current];
    const qN = current + 1;
    document.getElementById('qCurrent').textContent = qN;
    document.getElementById('quizProgressBar').style.width = (qN / questions.length * 100) + '%';

    const prevBtn   = document.getElementById('prevBtn');
    const nextBtn   = document.getElementById('nextBtn');
    const submitBtn = document.getElementById('submitBtn');
    prevBtn.disabled = current === 0;
    nextBtn.classList.toggle('hidden', current === questions.length - 1);
    submitBtn.classList.toggle('hidden', current !== questions.length - 1);

    const area = document.getElementById('questionArea');
    const diff = DIFF_LABELS[q.difficulty] || '';
    let optionsHTML = '';

    if (q.type === 'mcq' || q.type === 'true_false') {
      const opts = q.type === 'true_false' ? ['True', 'False'] : (q.options || []);
      optionsHTML = `<div class="options-list">
        ${opts.map((opt, i) => `
          <button class="option-btn ${answers[q.id] === opt ? 'selected' : ''}"
                  onclick="selectOption(${q.id}, '${opt.replace(/'/g,"\\'")}', this)">
            <span class="option-letter">${LETTERS[i]}</span>
            ${opt}
          </button>`).join('')}
      </div>`;
    } else {
      optionsHTML = `<input class="fill-input" type="text" placeholder="Type your answer…"
        value="${answers[q.id] || ''}"
        oninput="answers[${q.id}] = this.value">`;
    }

    area.innerHTML = `
      <div class="question-card">
        <div class="question-num">
          Question ${qN} &nbsp;·&nbsp; <span style="color:var(--text2);">${diff}</span>
        </div>
        <div class="question-text">${q.question}</div>
        ${optionsHTML}
      </div>`;
  }

  function selectOption(qId, value, btn) {
    answers[qId] = value;
    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    btn.querySelector('.option-letter').style.background = 'var(--accent)';
    btn.querySelector('.option-letter').style.color = '#fff';
  }

  function nextQ() { if (current < questions.length - 1) { current++; renderQuestion(); } }
  function prevQ() { if (current > 0) { current--; renderQuestion(); } }

  async function submitQuiz() {
    clearInterval(timerInterval);
    // Build answers array
    const answersArr = questions.map(q => ({
      question_id: q.id,
      answer: answers[q.id] || ''
    }));

    document.getElementById('quizState').classList.add('hidden');
    document.getElementById('loadingState').classList.remove('hidden');
    document.getElementById('loadingState').innerHTML = `
      <div style="text-align:center;">
        <div class="spinner" style="margin:0 auto 1rem;"></div>
        <p class="text-muted">Grading your answers…</p>
      </div>`;

    try {
      const result = await api.submitQuiz({ lesson_id: lessonId, answers: answersArr });
      document.getElementById('loadingState').classList.add('hidden');
      renderResults(result);

      // Badge popups
      if (result.badges_earned && result.badges_earned.length) {
        result.badges_earned.forEach((b, i) => {
          setTimeout(() => {
            const popup = document.createElement('div');
            popup.className = 'badge-earned-popup';
            popup.innerHTML = `<div style="font-size:2rem;">${b.icon}</div>
              <div style="font-weight:700;margin-top:0.3rem;">Badge Earned!</div>
              <div style="color:var(--accent2);">${b.name}</div>`;
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 3000);
          }, i * 1200);
        });
      }
    } catch(e) {
      toast(e.message, 'error');
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('quizState').classList.remove('hidden');
    }
  }

  function renderResults(result) {
    document.getElementById('resultsState').classList.remove('hidden');
    const pct  = result.score;
    const emoji = pct >= 80 ? '🎉' : pct >= 50 ? '👍' : '📖';
    const msg   = pct >= 80 ? 'Excellent work!' : pct >= 50 ? 'Good effort!' : 'Keep practicing!';
    const color = pct >= 80 ? 'var(--success)' : pct >= 50 ? 'var(--warning)' : 'var(--danger)';

    const feedbackHTML = (result.feedback || []).map(f => `
      <div class="fb-item ${f.is_correct ? 'correct' : 'wrong'}">
        <div class="fb-q">${f.is_correct ? '✅' : '❌'} ${f.question}</div>
        <div class="fb-row">
          <span>Your answer: <strong>${f.your_answer || '(empty)'}</strong></span>
          ${!f.is_correct ? `<span>· Correct: <strong style="color:var(--success)">${f.correct}</strong></span>` : ''}
        </div>
        ${f.explanation ? `<div style="margin-top:0.4rem;color:var(--text3);font-size:0.8rem;">💡 ${f.explanation}</div>` : ''}
      </div>`).join('');

    const nextHTML = result.next_recommendation ? `
      <div class="card mt-2" style="padding:1.25rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;">
        <div>
          <div style="font-size:0.78rem;color:var(--text2);">Next Recommended</div>
          <div style="font-weight:600;">${result.next_recommendation.title}</div>
          <div style="font-size:0.78rem;color:var(--accent2);">${result.next_recommendation.reason}</div>
        </div>
        <button class="btn btn-primary" onclick="window.location.href='course.html?id=${courseId}'">Continue →</button>
      </div>` : '';

    document.getElementById('resultsCard').innerHTML = `
      <div style="--pct:${pct * 3.6}deg;">
        <div style="font-size:3rem;margin-bottom:0.5rem;">${emoji}</div>
        <div class="score-circle" style="background:conic-gradient(${color} ${pct * 3.6}deg, var(--bg3) 0);">
          <div class="score-num" style="color:${color};">${pct}%</div>
        </div>
        <h2 style="margin-bottom:0.3rem;">${msg}</h2>
        <p class="text-muted">Quiz complete • Skill level updated</p>
        <div class="result-meta">
          <div class="result-meta-item">
            <div class="val text-success">${result.correct_q}</div>
            <div class="lbl">Correct</div>
          </div>
          <div class="result-meta-item">
            <div class="val text-danger">${result.total_q - result.correct_q}</div>
            <div class="lbl">Incorrect</div>
          </div>
          <div class="result-meta-item">
            <div class="val text-accent">+${result.xp_earned}</div>
            <div class="lbl">XP Earned</div>
          </div>
          <div class="result-meta-item">
            <div class="val">${result.new_skill_level ? Math.round(result.new_skill_level*100) + '%' : '–'}</div>
            <div class="lbl">Skill Level</div>
          </div>
        </div>
        <div style="display:flex;gap:1rem;justify-content:center;margin-top:1rem;">
          <button class="btn btn-primary" onclick="window.location.href='course.html?id=${courseId}'">← Back to Course</button>
          <button class="btn btn-secondary" onclick="window.location.href='dashboard.html'">Dashboard</button>
        </div>
        <div class="feedback-list">${feedbackHTML}</div>
      </div>`;

    document.getElementById('resultsCard').insertAdjacentHTML('afterend', nextHTML);
  }

  loadQuiz();
</script>
</body>
</html>
